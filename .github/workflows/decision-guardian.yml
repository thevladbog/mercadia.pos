name: Decision Guardian

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  decisions:
    name: Surface architecture decisions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decision Guardian
        uses: DecispherHQ/decision-guardian@v1.2.0
        env:
          DG_TELEMETRY: "0"
        with:
          token: ${{ github.token }}
          decision_file: ".decispher/decisions.md"
          fail_on_critical: false
          fail_on_error: true
