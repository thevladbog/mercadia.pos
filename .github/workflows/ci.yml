name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      codeql: ${{ steps.filter.outputs.codeql }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'contracts/openapi/**'
              - 'infra/migrations/**'
            frontend:
              - 'frontend/**'
              - 'contracts/openapi/**'
            codeql:
              - 'backend/**'
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: backend/go.work

      - name: Run tests
        run: |
          export GOCACHE="${{ github.workspace }}/.cache/go-build"
          mkdir -p "$GOCACHE"
          go test ./packages/platform/... ./services/store-edge/... ./services/central-backend/... ./services/hardware-agent/...

      - name: Run go vet
        run: |
          go vet ./packages/platform/...
          go vet ./services/store-edge/...
          go vet ./services/central-backend/...
          go vet ./services/hardware-agent/...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: backend
          args: >-
            ./packages/platform/...
            ./services/store-edge/...
            ./services/central-backend/...
            ./services/hardware-agent/...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: |
          for mod in packages/platform services/store-edge services/central-backend services/hardware-agent; do
            echo "govulncheck $mod"
            (cd "$mod" && govulncheck ./...)
          done

      - name: Export OpenAPI
        run: |
          mkdir -p ../contracts/openapi
          go run ./services/store-edge/cmd/export-openapi > ../contracts/openapi/store-edge.openapi.json
          go run ./services/central-backend/cmd/export-openapi > ../contracts/openapi/central.openapi.json
          go run ./services/hardware-agent/cmd/export-openapi > ../contracts/openapi/hardware-agent.openapi.json

      - name: Verify OpenAPI artifacts are up to date
        working-directory: ${{ github.workspace }}
        run: |
          git diff --exit-code contracts/openapi/

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.5.2

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Orval central client
        run: pnpm orval:central

      - name: Generate Orval store-edge client
        run: pnpm orval:store-edge

      - name: Verify generated client is up to date
        working-directory: ${{ github.workspace }}
        run: |
          git diff --exit-code frontend/packages/api-clients/central/src/generated/
          git diff --exit-code frontend/packages/api-clients/store-edge/src/generated/

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test UI package
        run: pnpm --filter @mercadia/ui test

      - name: Build admin-web
        run: pnpm --filter admin-web build

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  codeql:
    needs: changes
    if: needs.changes.outputs.codeql == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            source-root: backend
          - language: javascript-typescript
            source-root: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: backend/go.work

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          source-root: ${{ matrix.source-root }}

      - uses: github/codeql-action/autobuild@v4
        if: matrix.language == 'go'

      - uses: github/codeql-action/analyze@v4

  ci-gate:
    needs:
      - changes
      - backend
      - frontend
      - codeql
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail on required job errors
        if: |
          contains(fromJSON('["failure","cancelled"]'), needs.backend.result) ||
          contains(fromJSON('["failure","cancelled"]'), needs.frontend.result) ||
          contains(fromJSON('["failure","cancelled"]'), needs.codeql.result)
        run: exit 1
