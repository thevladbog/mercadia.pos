services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mercadia
      POSTGRES_PASSWORD: mercadia
      POSTGRES_DB: mercadia_pos
    ports:
      - "5433:5432"
    volumes:
      - mercadia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercadia -d mercadia_pos"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mercadia_postgres_data:
